name: ssrvpn_client
description: SSRVPN - 安全稳定的VPN客户端
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.0

  # YAML parsing for Clash config
  yaml: ^3.1.0

  # HTTP client for subscription fetch and Clash API
  http: ^1.0.0

  # Shared preferences for settings persistence
  shared_preferences: ^2.2.0

  # System tray support (Windows)
  system_tray: ^2.0.3

  # Window management (minimize, resize, etc.)
  window_manager: ^0.3.7

  # Tray manager
  tray_manager: ^0.2.1

  # FFI for registry and WinINet
  ffi: ^2.1.0

  # UUID generation
  uuid: ^3.0.7

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
